backend:
  name: git-gateway
  branch: main

# Hỗ trợ chạy test CMS offline qua proxy local
local_backend: true

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "website_data"
    label: "Quản trị thông tin"
    delete: false
    editor:
      preview: false
    files:
      - name: "profile"
        label: "Thông tin cá nhân & Kỹ năng"
        file: "src/app/config/profile.json"
        fields:
          - { label: "Họ và Tên", name: "name", widget: "string" }
          - { label: "Chức danh giới thiệu", name: "title", widget: "string" }
          - { label: "Tiểu sử ngắn", name: "bio", widget: "text" }
          - { label: "Giới thiệu bản thân chi tiết (Hỗ trợ Markdown)", name: "aboutLong", widget: "markdown", required: false }
          - { label: "Ảnh đại diện (Avatar)", name: "avatar", widget: "image", required: false }
          - { label: "Số năm kinh nghiệm", name: "experience", widget: "string" }
          - { label: "Chuyên môn chính", name: "specialization", widget: "string" }
          - { label: "Định hướng / Mục tiêu", name: "target", widget: "string" }
          - { label: "Đơn vị công tác", name: "affiliation", widget: "string" }
          - label: "Công cụ & Môi trường làm việc"
            name: "tools"
            widget: "list"
            fields:
              - { label: "Tên công cụ (Ví dụ: VS Code)", name: "name", widget: "string" }
              - { label: "Mức độ sử dụng (Ví dụ: Thành thạo / Tốt)", name: "level", widget: "string" }
          - label: "Kỹ năng & Dự án trọng tâm"
            name: "highlights"
            widget: "list"
            fields:
              - { label: "Mã định danh (không dấu, vd: web, translation)", name: "id", widget: "string" }
              - { label: "Tên nhóm kỹ năng (VD: Lập trình Web)", name: "category", widget: "string" }
              - { label: "Ký hiệu viết tắt (VD: WEB, LN, JPN)", name: "categoryShort", widget: "string" }
              - { label: "Tiêu đề dự án/kỹ năng", name: "title", widget: "string" }
              - { label: "Mô tả chi tiết", name: "desc", widget: "text" }
          - label: "Bản đồ Công nghệ (Tech Stack)"
            name: "techStack"
            widget: "list"
            fields:
              - { label: "Tên nhóm (Ví dụ: Frontend)", name: "category", widget: "string" }
              - { label: "Danh sách công nghệ", name: "items", widget: "list", field: { name: "item", widget: "string" } }
          - label: "Hoạt động & Lịch sử (Timeline)"
            name: "timeline"
            widget: "list"
            fields:
              - { label: "Tiêu đề công việc/hoạt động", name: "title", widget: "string" }
              - { label: "Thời gian thực hiện", name: "period", widget: "string" }
              - { label: "Đơn vị/Tổ chức", name: "sub", widget: "string" }
              - { label: "Mô tả chi tiết", name: "desc", widget: "text" }
          
          - label: "Học vấn (Education)"
            name: "education"
            widget: "list"
            fields:
              - { label: "Trường học", name: "school", widget: "string" }
              - { label: "Bằng cấp / Chuyên ngành", name: "degree", widget: "string" }
              - { label: "Niên khóa (Thời gian)", name: "period", widget: "string" }
              - { label: "GPA (Điểm số)", name: "gpa", widget: "string", required: false }
              - { label: "Chi tiết hoạt động", name: "details", widget: "text", required: false }

          - label: "Chứng chỉ & Bằng cấp (Certificates)"
            name: "certificates"
            widget: "list"
            fields:
              - { label: "Tên chứng chỉ / Giải thưởng", name: "title", widget: "string" }
              - { label: "Tổ chức cấp", name: "issuer", widget: "string" }
              - { label: "Năm cấp", name: "date", widget: "string" }
              - { label: "Hình ảnh chứng chỉ", name: "image", widget: "image", required: false }

          - label: "Các khối nội dung tùy chỉnh (Custom Blocks)"
            name: "customBlocks"
            widget: "list"
            types:
              - label: "Khối Văn bản (Rich Text Block)"
                name: "textBlock"
                widget: "object"
                fields:
                  - { label: "Tiêu đề khối", name: "title", widget: "string", required: false }
                  - { label: "Nội dung", name: "content", widget: "markdown" }
              - label: "Khối Ảnh nổi bật (Image Block)"
                name: "imageBlock"
                widget: "object"
                fields:
                  - { label: "Tiêu đề khối", name: "title", widget: "string", required: false }
                  - { label: "Hình ảnh", name: "image", widget: "image" }
                  - { label: "Chú thích", name: "caption", widget: "string", required: false }
              - label: "Khối Trích dẫn (Quote Block)"
                name: "quoteBlock"
                widget: "object"
                fields:
                  - { label: "Câu trích dẫn", name: "quote", widget: "text" }
                  - { label: "Tác giả / Nguồn", name: "author", widget: "string", required: false }

      - name: "projects_collection"
        label: "Danh sách dự án"
        file: "src/app/config/projects.json"
        fields:
          - label: "Danh sách dự án"
            name: "projects"
            widget: "list"
            fields:
              - { label: "ID dự án (không dấu, vd: aniko)", name: "id", widget: "string" }
              - { label: "Phân loại hiển thị (VD: FRONTEND // GAME DEV)", name: "area", widget: "string" }
              - { label: "Tên dự án", name: "title", widget: "string" }
              - { label: "Phân loại chính (game/research/tool)", name: "category", widget: "select", options: ["game", "research", "tool"] }
              - { label: "Mô tả ngắn", name: "desc", widget: "text" }
              - { label: "Tags", name: "tags", widget: "list", field: { name: "tag", widget: "string" } }
              - { label: "Độ phức tạp / Đánh giá (1-3 sao)", name: "stars", widget: "number", value_type: "int" }
              - label: "Công nghệ sử dụng (Emoji & Tên)"
                name: "drops"
                widget: "list"
                fields:
                  - { label: "Icon Emoji", name: "icon", widget: "string" }
                  - { label: "Tên công nghệ", name: "name", widget: "string" }
              - { label: "Nhãn hành động (VD: GHÉ THĂM GITHUB, ĐANG NGHIÊN CỨU)", name: "actionLabel", widget: "string" }
              - { label: "Đường dẫn liên kết (URL)", name: "url", widget: "string", required: false }
              - { label: "Kích hoạt hiển thị", name: "isActive", widget: "boolean" }

      - name: "dialog"
        label: "Kịch bản hội thoại Arona (Visual Novel)"
        file: "src/app/config/dialog.json"
        fields:
          - label: "Cấu hình khung hội thoại (Arona Chat Settings)"
            name: "aronaChat"
            widget: "object"
            fields:
              - { label: "Tiêu đề tiêu đề (Header)", name: "header", widget: "string" }
              - { label: "Tên nhân vật (Name)", name: "title", widget: "string" }
              - { label: "Mô tả trạng thái (Status)", name: "status", widget: "string" }
              - { label: "Dòng phụ đề hệ thống (Subtitle)", name: "sub", widget: "string" }
          - label: "Danh sách các nút kịch bản (Dialogue Nodes)"
            name: "nodes"
            widget: "list"
            fields:
              - { label: "Mã định danh nút (ID - vd: start, research)", name: "id", widget: "string" }
              - { label: "Nội dung Arona nói (Text)", name: "text", widget: "text" }
              - label: "Các lựa chọn phản hồi (Options)"
                name: "options"
                widget: "list"
                fields:
                  - { label: "Nội dung nhãn lựa chọn (Label)", name: "label", widget: "string" }
                  - { label: "Chuyển tới ID nút kế tiếp (Next Node ID)", name: "nextNode", widget: "string" }

  - name: "blog"
    label: "Bài viết & Nhật ký"
    folder: "src/app/content/blog"
    create: true
    format: "json"
    extension: "json"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Tiêu đề bài viết", name: "title", widget: "string" }
      - { label: "Ngày đăng", name: "date", widget: "datetime" }
      - { label: "Ảnh đại diện / Minh họa", name: "image", widget: "image", required: false }
      - { label: "Tóm tắt ngắn gọn", name: "summary", widget: "text" }
      - { label: "Nội dung bài viết", name: "body", widget: "markdown" }
